<!DOCTYPE html>
<html>
<head>
    <title>Travel Recommendation App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* NAVBAR */
        nav {
            background: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        input, button {
            padding: 5px;
        }

        /* HOME */
        #home {
            background-image: url('images/sydney_image.avif');
            background-size: cover;
            color: white;
            text-align: center;
            padding: 100px;
        }

        /* RESULTS GRID */
        #results {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 10px;
        }

        section {
            padding: 40px;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav>
    <div>
        <a href="#home">Home</a>
        <a href="#about">About Us</a>
        <a href="#contact">Contact Us</a>
    </div>

    <div>
        <input type="text" id="searchInput" placeholder="Search (beach, temple, country)">
        <button onclick="search()">Search</button>
        <button onclick="clearResults()">Reset</button>
    </div>
</nav>

<!-- ✅ HOME -->
<section id="home">
    <h1>Explore the World 🌍</h1>
    <p>Find the best travel destinations easily!</p>
</section>

<!-- ✅ RESULTS -->
<div id="results"></div>

<!-- ✅ ABOUT -->
<section id="about">
    <h2>About Us</h2>
    <p>This website helps users find the best travel destinations.</p>

    <h3>Our Team</h3>
    <p>Siddhi – Developer</p>
    <p>Harsh – Designer</p>
</section>

<!-- ✅ CONTACT -->
<section id="contact">
    <h2>Contact Us</h2>

    <form>
        <input type="text" placeholder="Your Name"><br><br>
        <input type="email" placeholder="Your Email"><br><br>
        <textarea placeholder="Your Message"></textarea><br><br>
        <button type="submit">Submit</button>
    </form>
</section>

<!-- ✅ JS LINK (VERY IMPORTANT) -->
<script src="travel_recommendation.js"></script>

</body>
</html>
